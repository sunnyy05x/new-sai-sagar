<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Order Menu — New Sai Sagar Pure Veg</title>
  <meta name="description" content="Browse our menu and place your order online. Pure vegetarian food at New Sai Sagar Restaurant, Bhosari, Pune.">
  <link rel="stylesheet" href="../shared/styles.css?v=7">
  <style>
    #app { position: relative; min-height: 100vh; }
    body { padding-bottom: 80px; }

    .customer-header {
      position: sticky;
      top: 0; z-index: 100; padding: var(--space-md) var(--space-lg);
      background: linear-gradient(180deg, rgba(10, 10, 18, 0.95) 0%, rgba(10, 10, 18, 0.85) 100%);
      backdrop-filter: blur(24px) saturate(1.5);
      -webkit-backdrop-filter: blur(24px) saturate(1.5);
      border-bottom: none;
      box-shadow:
        0 0 0 1px rgba(255, 166, 43, 0.08) inset,
        0 4px 24px rgba(0, 0, 0, 0.3);
    }
    .customer-header::after {
      content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, var(--primary), var(--accent), var(--primary-light), transparent);
      z-index: 5;
      pointer-events: none;
    }

    @keyframes headerGlow {
      0%, 100% { box-shadow: 0 0 0 1px rgba(255, 166, 43, 0.08) inset, 0 4px 24px rgba(0, 0, 0, 0.3); }
      50% { box-shadow: 0 0 0 1px rgba(32, 227, 178, 0.12) inset, 0 4px 24px rgba(0, 0, 0, 0.3), 0 0 40px rgba(255, 166, 43, 0.06); }
    }

    .header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: var(--space-sm); }
    .brand { display: flex; align-items: center; gap: var(--space-sm); }
    .brand-logo { width: 40px; height: 40px; border-radius: var(--radius-sm); box-shadow: 0 4px 20px rgba(255, 166, 43, 0.3); animation: logoFloat 4s ease-in-out infinite; }
    @keyframes logoFloat { 0%, 100% { transform: translateY(0) rotate(-2deg); } 50% { transform: translateY(-4px) rotate(2deg); } }
    .brand-name { font-family: var(--font-heading); font-weight: 800; font-size: var(--text-lg); background: linear-gradient(135deg, var(--primary-light), var(--accent-light), var(--primary)); background-size: 200% 200%; -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; animation: brandGradient 5s ease-in-out infinite; }
    @keyframes brandGradient { 0%, 100% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } }
    .brand-tag { font-size: var(--text-xs); color: var(--accent-light); font-weight: 600; text-shadow: 0 0 10px rgba(32, 227, 178, 0.5); animation: tagPulse 2s ease-in-out infinite; }
    @keyframes tagPulse { 0%, 100% { opacity: 0.9; } 50% { opacity: 1; text-shadow: 0 0 20px rgba(32, 227, 178, 0.8); } }
    .table-indicator {
      background: linear-gradient(135deg, var(--primary-subtle), rgba(32, 227, 178, 0.08));
      border: 1px solid rgba(255, 166, 43, 0.35);
      padding: 8px 18px; border-radius: var(--radius-full);
      font-family: var(--font-heading); font-weight: 700; font-size: var(--text-sm); color: var(--primary-light);
      box-shadow: 0 4px 20px rgba(255, 166, 43, 0.15), inset 0 1px 0 rgba(255, 255, 255, 0.05);
      position: relative; overflow: hidden;
    }
    .table-indicator::before { content: ''; position: absolute; inset: 0; background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent); animation: shimmer 3s infinite; }
    @keyframes shimmer { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }

    .search-box { position: relative; }
    .search-area { margin-bottom: var(--space-sm); }
    .search-area .form-input {
      background: var(--bg-card); border-color: var(--border-glass);
      border-radius: var(--radius-full); padding: 12px 18px 12px 46px;
      transition: all 0.3s; width: 100%;
      box-shadow: inset 0 2px 8px rgba(0, 0, 0, 0.2);
    }
    .search-area .form-input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px var(--primary-glow), inset 0 2px 8px rgba(0, 0, 0, 0.2);
      background: var(--bg-surface);
    }
    .search-icon { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: var(--text-muted); transition: color 0.3s; z-index: 5; pointer-events: none; line-height: 1; }
    .search-area:focus-within .search-icon { color: var(--primary); text-shadow: 0 0 10px var(--primary-glow); }

    /* Category Pills */
    .category-pills {
      display: flex; gap: 10px; overflow-x: auto;
      padding: 8px var(--space-lg); scrollbar-width: thin; -ms-overflow-style: auto;
      position: relative; z-index: 1;
    }
    .category-pills::-webkit-scrollbar { width: 4px; height: 4px; }
    .category-pills::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 4px; }
    .category-pills::-webkit-scrollbar-track { background: transparent; }

    .category-pill {
      display: inline-flex; align-items: center; justify-content: center; gap: 6px; flex-shrink: 0;
      padding: 10px 22px 10px 16px; border-radius: var(--radius-full);
      background: linear-gradient(145deg, var(--bg-card), var(--bg-surface));
      border: 1px solid var(--border-glass);
      color: var(--text-secondary); font-size: var(--text-sm); font-weight: 600;
      cursor: pointer; transition: all 0.3s var(--ease-out); white-space: nowrap; user-select: none;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2); position: relative; overflow: hidden;
    }
    .category-pill::before {
      content: ''; position: absolute; inset: 0; border-radius: inherit;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      opacity: 0; transition: opacity 0.3s; z-index: -1;
    }
    .category-pill:hover {
      color: var(--text-primary); border-color: rgba(255, 166, 43, 0.3);
      transform: translateY(-2px); box-shadow: 0 8px 24px rgba(255, 166, 43, 0.2);
    }
    .category-pill.active {
      color: var(--text-inverse); border-color: transparent;
      box-shadow: 0 6px 28px var(--primary-glow), 0 0 0 1px rgba(255, 255, 255, 0.1) inset;
    }
    .category-pill.active::before { opacity: 1; }
    .category-pill:active { transform: scale(0.96); }

    .pill-sticker { width: 24px; height: 24px; flex-shrink: 0; object-fit: cover; border-radius: 50%; border: 1px solid rgba(255,255,255,0.15); box-shadow: 0 2px 8px rgba(0,0,0,0.3); transition: transform 0.3s, box-shadow 0.3s; }
    .category-pill:hover .pill-sticker { transform: scale(1.1) rotate(5deg); box-shadow: 0 4px 16px rgba(255, 166, 43, 0.4); }
    .category-pill.active .pill-sticker { border-color: rgba(255,255,255,0.3); box-shadow: 0 2px 12px rgba(255, 255, 255, 0.2); }

    /* Menu Banner */
    .menu-banner { width: 100%; height: 260px; position: relative; overflow: hidden; margin-bottom: calc(var(--space-md) * -1); z-index: 10; }
    .menu-banner img { width: 100%; height: 100%; object-fit: cover; opacity: 0.9; filter: saturate(1.1) contrast(1.05); transition: transform 0.8s, filter 0.8s; }
    .menu-banner:hover img { transform: scale(1.03); filter: saturate(1.2) contrast(1.1); }
    .menu-banner::after {
      content: ''; position: absolute; inset: 0; z-index: 1;
      background:
        linear-gradient(180deg, transparent 50%, rgba(8, 8, 12, 0.7) 100%),
        linear-gradient(90deg, rgba(255, 166, 43, 0.05) 0%, transparent 50%, rgba(32, 227, 178, 0.05) 100%);
      pointer-events: none;
    }
    .menu-banner::before {
      content: ''; position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
      width: 80%; height: 60px; z-index: 2; pointer-events: none;
      background: radial-gradient(ellipse at center, rgba(255, 166, 43, 0.15) 0%, transparent 70%);
      filter: blur(20px);
    }

    /* Menu Section */
    .menu-section { padding: var(--space-md) var(--space-lg); position: relative; z-index: 5; }

    .category-section { margin-bottom: var(--space-2xl); }
    .category-title {
      font-family: var(--font-heading); font-size: var(--text-xl); font-weight: 800;
      margin-bottom: var(--space-md); display: flex; align-items: center; gap: var(--space-sm);
      position: sticky; top: 0; background: var(--bg-body); padding: var(--space-sm) 0; z-index: 10;
      color: var(--text-primary);
      text-shadow: 0 0 30px rgba(255, 166, 43, 0.1);
    }
    .cat-title-sticker { width: 32px; height: 32px; border-radius: var(--radius-md); object-fit: cover; box-shadow: 0 4px 16px rgba(0,0,0,0.3), 0 0 0 2px rgba(255, 166, 43, 0.2); animation: stickerFloat 3s ease-in-out infinite; }
    @keyframes stickerFloat { 0%, 100% { transform: translateY(0) rotate(-1deg); } 50% { transform: translateY(-3px) rotate(1deg); } }
    .category-count { font-size: var(--text-xs); color: var(--text-muted); font-weight: 500; background: var(--bg-card); padding: 2px 10px; border-radius: var(--radius-full); border: 1px solid var(--border-glass); }

    .menu-grid { display: flex; flex-direction: column; gap: var(--space-md); }

    /* Menu Cards */
    .menu-card {
      background: linear-gradient(145deg, var(--bg-card) 0%, var(--bg-surface) 100%);
      border: 1px solid var(--border-glass);
      border-radius: var(--radius-xl); overflow: hidden;
      display: flex; gap: var(--space-md); padding: var(--space-md);
      transition: all 0.4s var(--ease-out); position: relative;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.25);
    }
    .menu-card::before {
      content: ''; position: absolute; inset: 0; border-radius: inherit;
      background: linear-gradient(135deg, rgba(255, 166, 43, 0.06), rgba(32, 227, 178, 0.04));
      opacity: 0; transition: opacity 0.4s; z-index: 0;
    }
    .menu-card:hover {
      transform: translateY(-4px) scale(1.005);
      border-color: rgba(255, 166, 43, 0.25);
      box-shadow:
        0 16px 48px rgba(0, 0, 0, 0.4),
        0 0 0 1px rgba(255, 166, 43, 0.15),
        0 0 60px rgba(255, 166, 43, 0.08);
    }
    .menu-card:hover::before { opacity: 1; }

    .item-sticker { width: 72px; height: 72px; flex-shrink: 0; border-radius: var(--radius-lg); overflow: hidden; box-shadow: 0 6px 20px rgba(0,0,0,0.3); position: relative; z-index: 1; transition: transform 0.4s, box-shadow 0.4s; }
    .item-sticker img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.6s; }
    .menu-card:hover .item-sticker { transform: scale(1.08) rotate(-2deg); box-shadow: 0 12px 32px rgba(255, 166, 43, 0.3); }
    .menu-card:hover .item-sticker img { transform: scale(1.1); }
    .item-sticker::after { content: ''; position: absolute; inset: 0; background: linear-gradient(135deg, transparent 50%, rgba(255, 166, 43, 0.1) 100%); pointer-events: none; }

    .item-details { flex: 1; min-width: 0; position: relative; z-index: 1; }
    .item-name { font-family: var(--font-heading); font-size: var(--text-base); font-weight: 700; color: var(--text-primary); margin-bottom: 4px; transition: color 0.3s; overflow-wrap: break-word; word-break: break-word; }
    .menu-card:hover .item-name { background: linear-gradient(135deg, var(--primary-light), var(--accent-light)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .item-desc { font-size: var(--text-xs); color: var(--text-secondary); line-height: 1.4; margin-bottom: var(--space-xs); display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; text-overflow: ellipsis; }
    .item-badges { display: flex; gap: 6px; margin-bottom: var(--space-xs); flex-wrap: wrap; }
    .badge { font-size: 9px; padding: 2px 8px; border-radius: var(--radius-full); font-weight: 700; letter-spacing: 0.5px; box-shadow: 0 2px 8px rgba(0,0,0,0.2); line-height: 1.4; }
    .badge-veg { background: linear-gradient(135deg, var(--accent-subtle), rgba(32, 227, 178, 0.06)); color: var(--accent-light); border: 1px solid rgba(32, 227, 178, 0.25); }
    .badge-jain { background: linear-gradient(135deg, rgba(255, 193, 7, 0.15), rgba(255, 213, 79, 0.06)); color: var(--warning); border: 1px solid rgba(255, 193, 7, 0.3); animation: jainPulse 2.5s ease-in-out infinite; }
    @keyframes jainPulse { 0%, 100% { box-shadow: 0 2px 8px rgba(255, 193, 7, 0.2); } 50% { box-shadow: 0 4px 16px rgba(255, 193, 7, 0.4); } }

    .item-bottom { display: flex; align-items: center; justify-content: space-between; gap: var(--space-sm); margin-top: var(--space-xs); flex-wrap: wrap; }
    .item-price { font-family: var(--font-heading); font-size: var(--text-lg); font-weight: 800; color: var(--primary-light); text-shadow: 0 0 20px rgba(255, 166, 43, 0.3); white-space: nowrap; flex-shrink: 0; }

    .qty-stepper { display: inline-flex; align-items: center; gap: 6px; background: linear-gradient(145deg, var(--bg-surface), var(--bg-card)); border: 1px solid rgba(255, 166, 43, 0.2); border-radius: var(--radius-full); padding: 4px 10px; box-shadow: inset 0 2px 8px rgba(0,0,0,0.2), 0 0 0 1px rgba(255, 166, 43, 0.1) inset; }
    .qty-stepper button { width: 28px; height: 28px; border-radius: 50%; border: none; background: var(--primary); color: white; font-size: var(--text-base); font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; box-shadow: 0 2px 8px rgba(255, 166, 43, 0.3); }
    .qty-stepper button:hover { background: var(--primary-light); transform: scale(1.1); box-shadow: 0 4px 16px rgba(255, 166, 43, 0.5); }
    .qty-stepper button:active { transform: scale(0.9); }
    .qty-value { min-width: 24px; text-align: center; font-family: var(--font-heading); font-weight: 700; font-size: var(--text-sm); color: var(--text-primary); }

    .add-btn { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: white; border: none; border-radius: var(--radius-full); padding: 10px 24px; font-weight: 700; font-size: var(--text-xs); letter-spacing: 0.5px; cursor: pointer; transition: all 0.3s; box-shadow: 0 4px 16px rgba(255, 166, 43, 0.4); position: relative; overflow: hidden; }
    .add-btn::before { content: ''; position: absolute; inset: 0; background: linear-gradient(135deg, var(--accent), var(--accent-light)); opacity: 0; transition: opacity 0.3s; }
    .add-btn:hover { transform: translateY(-2px) scale(1.05); box-shadow: 0 8px 24px rgba(255, 166, 43, 0.5); }
    .add-btn:hover::before { opacity: 1; }
    .add-btn:active { transform: scale(0.97); }
    .add-btn span { position: relative; z-index: 1; }

    /* Cart Bar */
    .cart-bar { position: fixed; bottom: 0; left: 0; right: 0; z-index: 200; padding: var(--space-md) var(--space-lg); background: linear-gradient(180deg, transparent, rgba(10, 10, 18, 0.98) 30%, rgba(10, 10, 18, 1)); backdrop-filter: blur(30px); border-top: 1px solid transparent; background-image: linear-gradient(rgba(10,10,18,0.98), rgba(10,10,18,1)), linear-gradient(90deg, var(--primary), var(--accent)); background-origin: border-box; background-clip: padding-box, border-box; border-image-slice: 1; box-shadow: 0 -4px 40px rgba(0, 0, 0, 0.4), 0 0 60px rgba(255, 166, 43, 0.08); animation: cartBarSlide 0.5s var(--ease-out); }
    @keyframes cartBarSlide { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

    .cart-summary { display: flex; align-items: center; justify-content: space-between; margin-bottom: var(--space-sm); }
    .cart-count { font-size: var(--text-sm); color: var(--text-secondary); font-weight: 500; }
    .cart-total { font-family: var(--font-heading); font-size: var(--text-xl); font-weight: 800; color: var(--primary-light); text-shadow: 0 0 20px rgba(255, 166, 43, 0.4); }

    .btn-primary {
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      border: none; color: white; font-weight: 700; border-radius: var(--radius-full);
      padding: 14px 28px; font-size: var(--text-sm); cursor: pointer;
      transition: all 0.3s; box-shadow: 0 6px 24px rgba(255, 166, 43, 0.4);
      position: relative; overflow: hidden;
    }
    .btn-primary::before { content: ''; position: absolute; inset: 0; background: linear-gradient(135deg, var(--accent), var(--accent-light)); opacity: 0; transition: opacity 0.3s; }
    .btn-primary:hover { transform: translateY(-3px) scale(1.02); box-shadow: 0 12px 32px rgba(255, 166, 43, 0.55); }
    .btn-primary:hover::before { opacity: 1; }
    .btn-primary:active { transform: scale(0.98); }
    .btn-primary span { position: relative; z-index: 1; }

    .btn-outline { background: transparent; border: 1px solid var(--border-glass); color: var(--text-secondary); font-weight: 600; border-radius: var(--radius-full); padding: 12px 24px; transition: all 0.3s; }
    .btn-outline:hover { border-color: var(--primary); color: var(--primary-light); background: var(--primary-subtle); }

    /* Cart Sheet */
    .cart-sheet-overlay { position: fixed; inset: 0; background: rgba(8, 8, 12, 0.7); backdrop-filter: blur(8px); z-index: 300; opacity: 0; visibility: hidden; transition: all 0.3s; }
    .cart-sheet-overlay.active { opacity: 1; visibility: visible; }
    .cart-sheet { position: fixed; bottom: 0; left: 0; right: 0; max-height: 85vh; background: var(--bg-body); border-radius: var(--radius-xl) var(--radius-xl) 0 0; border-top: 1px solid var(--border-glass); box-shadow: 0 -8px 48px rgba(0,0,0,0.5), 0 0 0 1px rgba(255, 166, 43, 0.1) inset; z-index: 301; transform: translateY(100%); transition: transform 0.4s var(--ease-drawer); display: flex; flex-direction: column; }
    .cart-sheet-overlay.active + .cart-sheet { transform: translateY(0); }
    .cart-sheet-handle { width: 48px; height: 4px; background: var(--border-glass); border-radius: 2px; margin: var(--space-md) auto var(--space-sm); cursor: pointer; transition: background 0.3s; }
    .cart-sheet-handle:hover { background: var(--primary); }
    .cart-sheet h3 { font-family: var(--font-heading); font-size: var(--text-xl); font-weight: 700; text-align: center; margin-bottom: var(--space-lg); padding: 0 var(--space-lg); background: linear-gradient(135deg, var(--primary-light), var(--accent-light)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }

    .cart-item { display: flex; gap: var(--space-md); padding: var(--space-md); background: linear-gradient(145deg, var(--bg-card), var(--bg-surface)); border: 1px solid var(--border-glass); border-radius: var(--radius-lg); margin: 0 var(--space-lg) var(--space-md); transition: all 0.3s; }
    .cart-item:hover { border-color: rgba(255, 166, 43, 0.2); box-shadow: 0 4px 16px rgba(255, 166, 43, 0.1); }
    .cart-item .item-sticker { width: 56px; height: 56px; border-radius: var(--radius-md); }
    .cart-item .item-details { flex: 1; }
    .cart-item .item-name { font-size: var(--text-sm); margin-bottom: 4px; }
    .cart-item .item-price { color: var(--primary-light); font-size: var(--text-base); }
    .cart-item .qty-stepper { margin-top: var(--space-xs); }

    .cart-special { padding: 0 var(--space-lg) var(--space-lg); }
    .cart-special .form-label { font-size: var(--text-xs); color: var(--text-muted); margin-bottom: var(--space-xs); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
    .cart-special textarea { width: 100%; background: var(--bg-card); border: 1px solid var(--border-glass); border-radius: var(--radius-lg); padding: var(--space-md); color: var(--text-primary); font-size: var(--text-sm); resize: none; min-height: 80px; transition: all 0.3s; }
    .cart-special textarea:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-glow); }

    .cart-totals { padding: var(--space-lg); border-top: 1px solid var(--border-glass); background: linear-gradient(180deg, transparent, var(--bg-surface)); margin-top: auto; }
    .cart-totals .total-row { display: flex; justify-content: space-between; padding: 6px 0; font-size: var(--text-sm); }
    .cart-totals .total-row.grand { font-size: var(--text-2xl); font-family: var(--font-heading); font-weight: 800; color: var(--primary); padding-top: var(--space-md); border-top: 1px solid var(--border-glass); margin-top: var(--space-sm); }
    .cart-actions { padding: 0 var(--space-lg) var(--space-xl); display: flex; flex-direction: column; gap: var(--space-sm); }

    /* Empty State */
    .empty-state { text-align: center; padding: var(--space-3xl) var(--space-lg); color: var(--text-secondary); }
    .empty-icon { font-size: 4rem; margin-bottom: var(--space-md); animation: floatIcon 3s ease-in-out infinite; }
    @keyframes floatIcon { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
    .empty-title { font-family: var(--font-heading); font-size: var(--text-xl); font-weight: 700; color: var(--text-primary); margin-bottom: var(--space-xs); }
    .empty-text { font-size: var(--text-sm); }

    /* Order Status */
    .order-status-overlay { position: fixed; inset: 0; z-index: 500; background: rgba(8, 8, 12, 0.95); backdrop-filter: blur(24px); display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: var(--space-xl); opacity: 0; visibility: hidden; transition: all 0.4s; }
    .order-status-overlay.active { opacity: 1; visibility: visible; }
    .order-success-icon { font-size: 6rem; margin-bottom: var(--space-lg); animation: bounceIn 0.6s var(--ease-out) both, iconSpin 4s ease-in-out infinite; }
    @keyframes iconSpin { 0%, 100% { transform: rotate(-3deg); } 50% { transform: rotate(3deg); } }
    .order-success-title { font-family: var(--font-heading); font-size: var(--text-3xl); font-weight: 800; margin-bottom: var(--space-sm); background: linear-gradient(135deg, var(--primary-light), var(--accent-light), var(--primary)); background-size: 200% 200%; -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; animation: brandGradient 4s ease-in-out infinite; }
    .order-success-sub { color: var(--text-secondary); margin-bottom: var(--space-xl); font-size: var(--text-base); }
    .order-number-display { font-family: var(--font-heading); font-size: var(--text-2xl); font-weight: 700; color: var(--primary); background: var(--primary-subtle); padding: var(--space-md) var(--space-xl); border-radius: var(--radius-md); border: 1px solid rgba(255, 166, 43, 0.3); margin-bottom: var(--space-xl); box-shadow: 0 4px 24px rgba(255, 166, 43, 0.15); animation: orderNumberPulse 2s ease-in-out infinite; }
    @keyframes orderNumberPulse { 0%, 100% { box-shadow: 0 4px 24px rgba(255, 166, 43, 0.15); } 50% { box-shadow: 0 8px 40px rgba(255, 166, 43, 0.3); } }

    .order-tracker { width: 100%; max-width: 400px; margin-top: var(--space-lg); }
    .tracker-step { display: flex; align-items: flex-start; gap: var(--space-md); padding: var(--space-md) 0; position: relative; }
    .tracker-step::before { content: ''; position: absolute; left: 15px; top: 42px; width: 2px; height: calc(100% - 32px); background: linear-gradient(180deg, var(--border-glass), transparent); }
    .tracker-step:last-child::before { display: none; }
    .tracker-dot { width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; background: var(--bg-card); border: 2px solid var(--border-glass); font-size: 0.9rem; z-index: 1; position: relative; transition: all 0.4s; }
    .tracker-dot::after { content: ''; position: absolute; inset: -4px; border-radius: 50%; background: var(--primary); opacity: 0; filter: blur(8px); transition: opacity 0.3s; }
    .tracker-step.completed .tracker-dot { background: var(--success); border-color: var(--success); }
    .tracker-step.completed .tracker-dot::after { opacity: 0.4; background: var(--success); }
    .tracker-step.active .tracker-dot { background: var(--primary); border-color: var(--primary); box-shadow: 0 0 0 4px var(--primary-glow); animation: trackerPulse 1.5s ease-in-out infinite; }
    .tracker-step.active .tracker-dot::after { opacity: 0.5; }
    @keyframes trackerPulse { 0%, 100% { box-shadow: 0 0 0 4px var(--primary-glow); } 50% { box-shadow: 0 0 0 8px rgba(255, 166, 43, 0.15); } }
    .tracker-info .tracker-title { font-weight: 600; font-size: var(--text-sm); }
    .tracker-info .tracker-time { font-size: var(--text-xs); color: var(--text-muted); margin-top: 2px; }

    /* Table Select */
    .table-select { text-align: center; padding: var(--space-xl); }
    .table-select h2 { font-family: var(--font-heading); font-size: var(--text-2xl); font-weight: 800; margin-bottom: var(--space-sm); background: linear-gradient(135deg, var(--primary-light), var(--accent-light)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .table-select p { color: var(--text-secondary); margin-bottom: var(--space-xl); font-size: var(--text-sm); }
    .table-buttons { display: grid; grid-template-columns: repeat(5, 1fr); gap: var(--space-sm); max-width: 350px; margin: 0 auto var(--space-lg); }
    .table-btn { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; border-radius: var(--radius-md); border: 2px solid var(--border-glass); background: linear-gradient(145deg, var(--bg-card), var(--bg-surface)); color: var(--text-primary); font-family: var(--font-heading); font-weight: 700; font-size: var(--text-xl); cursor: pointer; transition: all 0.3s var(--ease-out); position: relative; overflow: hidden; }
    .table-btn::before { content: ''; position: absolute; inset: 0; background: linear-gradient(135deg, var(--primary), var(--accent)); opacity: 0; transition: opacity 0.3s; z-index: -1; }
    .table-btn:hover { border-color: var(--primary); color: var(--primary-light); transform: translateY(-4px) scale(1.05); box-shadow: 0 12px 32px rgba(255, 166, 43, 0.3); }
    .table-btn:hover::before { opacity: 0.1; }
    .table-btn:active { transform: scale(0.95); }
    .table-btn.occupied { opacity: 0.3; pointer-events: none; }
    .table-btn.occupied:hover { transform: none; box-shadow: none; border-color: var(--border-glass); }

    /* Animations */
    @keyframes bounceIn { from { opacity: 0; transform: scale(0.3); } to { opacity: 1; transform: scale(1); } }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .animate-fade-in { animation: fadeInUp 0.5s var(--ease-out) both; }
    .animate-fade-in-up { animation: fadeInUp 0.5s var(--ease-out) both; }
    .stagger > * { opacity: 0; animation: staggerIn 0.4s var(--ease-out) forwards; }
    .stagger > *:nth-child(1) { animation-delay: 0.05s; }
    .stagger > *:nth-child(2) { animation-delay: 0.1s; }
    .stagger > *:nth-child(3) { animation-delay: 0.15s; }
    .stagger > *:nth-child(4) { animation-delay: 0.2s; }
    .stagger > *:nth-child(5) { animation-delay: 0.25s; }
    .stagger > *:nth-child(6) { animation-delay: 0.3s; }
    .stagger > *:nth-child(7) { animation-delay: 0.35s; }
    .stagger > *:nth-child(8) { animation-delay: 0.4s; }
    @keyframes staggerIn { from { opacity: 0; transform: translateY(16px) scale(0.98); } to { opacity: 1; transform: translateY(0) scale(1); } }

    .cart-pulse { animation: cartPulse 0.5s ease-out; }
    @keyframes cartPulse { 0% { transform: scale(1); box-shadow: 0 6px 24px rgba(255, 166, 43, 0.4); } 50% { transform: scale(1.05); box-shadow: 0 12px 40px rgba(255, 166, 43, 0); } 100% { transform: scale(1); box-shadow: 0 6px 24px rgba(255, 166, 43, 0.4); } }

    @media (max-width: 480px) {
      .customer-header { padding: var(--space-sm) var(--space-md); }
      .menu-section { padding: var(--space-sm) var(--space-md); }
      .category-pills { padding: 8px var(--space-md); }
      .category-title { top: 0; font-size: var(--text-lg); }
      .menu-banner { height: 200px; }
      .table-buttons { grid-template-columns: repeat(4, 1fr); }
      .cart-bar { padding: var(--space-sm) var(--space-md); }
      .btn-primary { padding: 12px 20px; font-size: var(--text-xs); }
      .menu-card { padding: var(--space-sm); gap: var(--space-sm); }
      .item-sticker { width: 60px; height: 60px; border-radius: var(--radius-md); }
      .item-name { font-size: var(--text-sm); }
      .item-price { font-size: var(--text-base); }
      .add-btn { padding: 8px 16px; font-size: 11px; }
      .qty-stepper { padding: 2px 6px; }
      .qty-stepper button { width: 24px; height: 24px; font-size: var(--text-sm); }
      .item-bottom { gap: var(--space-xs); }
    }
  </style>
</head>
<body>
  <div class="page-wrapper" id="app">
    <!-- Table Selection Screen -->
    <div id="table-select-screen" class="table-select hidden">
      <div style="margin-top: 20vh;">
        <div style="font-size: 3rem; margin-bottom: var(--space-lg);"><i data-lucide="utensils"></i>️</div>
        <h2>Welcome to <span class="text-gradient">New Sai Sagar</span></h2>
        <p>Select your table number to start ordering</p>
        <div class="table-buttons" id="table-buttons"></div>
      </div>
    </div>

    <!-- Main Menu Screen -->
    <div id="menu-screen" class="hidden">
      <header class="customer-header no-print">
        <div class="header-top">
          <div class="brand">
            <img src="../assets/logo.png?v=2" alt="Logo" class="brand-logo">
            <div>
              <div class="brand-name">New Sai Sagar</div>
              <div class="brand-tag"><i data-lucide="leaf"></i> Pure Veg</div>
            </div>
          </div>
          <div class="table-indicator" id="table-display">Table —</div>
        </div>
        <div class="search-area search-box">
          <span class="search-icon"><i data-lucide="search"></i></span>
          <input type="text" class="form-input" id="search-input" placeholder="Search menu items...">
        </div>
        <div class="category-pills" id="category-pills"></div>
      </header>
      
      <div class="menu-banner">
         <img src="../assets/menu_banner.png" alt="Delicious Indian Cuisine">
      </div>

      <main class="menu-section" id="menu-container"></main>

      <!-- Cart Bottom Bar -->
      <div class="cart-bar no-print" id="cart-bar">
        <div class="cart-summary">
          <span class="cart-count" id="cart-count">0 items</span>
          <span class="cart-total" id="cart-total">₹0</span>
        </div>
        <button class="btn btn-primary btn-lg" id="view-cart-btn" onclick="openCart()">
          View Cart <i data-lucide="shopping-cart"></i>
        </button>
      </div>
    </div>

    <!-- Cart Bottom Sheet -->
    <div class="cart-sheet-overlay" id="cart-overlay" onclick="closeCart()"></div>
    <div class="cart-sheet" id="cart-sheet">
      <div class="cart-sheet-handle" onclick="closeCart()"></div>
      <h3><i data-lucide="shopping-cart"></i> Your Order</h3>
      <div id="cart-items"></div>
      <div class="cart-special">
        <label class="form-label">Special Instructions (optional)</label>
        <textarea id="special-instructions" placeholder="Any allergies, extra spicy, no onion, etc."></textarea>
      </div>
      <div class="cart-totals" id="cart-totals"></div>
      <div class="cart-actions">
        <button class="btn btn-primary btn-lg btn-block" id="place-order-btn" onclick="placeOrder()">
          Place Order ✨
        </button>
        <button class="btn btn-outline btn-block" onclick="closeCart()">Continue Browsing</button>
      </div>
    </div>

    <!-- Order Status Overlay -->
    <div class="order-status-overlay" id="order-status-overlay">
      <div class="order-success-icon" id="order-status-icon"><i data-lucide="check-circle"></i></div>
      <h2 class="order-success-title" id="order-status-title">Order Placed!</h2>
      <p class="order-success-sub" id="order-status-sub">Your order has been sent to the kitchen</p>
      <div class="order-number-display" id="order-number-display"></div>
      <div class="order-tracker" id="order-tracker"></div>
      <button class="btn btn-outline mt-lg" id="new-order-btn" onclick="startNewOrder()" style="margin-top:var(--space-xl)">
        Place Another Order
      </button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../shared/data.js?v=2"></script>
  <script src="../shared/utils.js?v=5"></script>
  <script src="../shared/store.js?v=5"></script>
  <script>
    /* ── State ──────────────────────────────── */
    var cart = [];
    var currentTable = null;
    var currentOrderId = null;
    var activeCategory = 'All';
    var searchQuery = '';

    /* ── Init ───────────────────────────────── */
    document.addEventListener('DOMContentLoaded', function () {
      SaiSagar.Sync.onMessage(function (msg) {
        if (msg.type === SaiSagar.Store.EVENTS.READY) {
          var tableParam = SaiSagar.Utils.getUrlParam('table');
          var modeParam = SaiSagar.Utils.getUrlParam('mode');
          var isParcel = (modeParam && modeParam.toLowerCase() === 'parcel') || 
                         (tableParam && tableParam.toLowerCase() === 'parcel');
          if (isParcel) {
            currentTable = 'Parcel';
            showMenuScreen();
          } else if (tableParam && !isNaN(parseInt(tableParam, 10))) {
            currentTable = parseInt(tableParam, 10);
            showMenuScreen();
          } else {
            showTableSelect();
          }
        }
        if (msg.type === SaiSagar.Store.EVENTS.ORDER_STATUS && currentOrderId) {
          if (msg.payload.orderId === currentOrderId) {
            updateOrderTracking(msg.payload.order);
          }
        }
        if (msg.type === SaiSagar.Store.EVENTS.MENU_UPDATED) {
          renderMenu();
        }
      });
      SaiSagar.Store.init();

      // Search
      document.getElementById('search-input').addEventListener('input',
        SaiSagar.Utils.debounce(function (e) {
          searchQuery = e.target.value.toLowerCase();
          renderMenu();
        }, 200)
      );
    });

    /* ── Table Selection ────────────────────── */
    function showTableSelect() {
      document.getElementById('table-select-screen').classList.remove('hidden');
      document.getElementById('menu-screen').classList.add('hidden');

      var tables = SaiSagar.Store.TableStore.getAll();
      var container = document.getElementById('table-buttons');
      container.innerHTML = '';

      tables.forEach(function (t) {
        var btn = document.createElement('button');
        btn.className = 'table-btn' + (t.status === 'occupied' ? ' occupied' : '');
        btn.textContent = t.number;
        btn.title = t.status === 'occupied' ? 'Table occupied' : 'Table ' + t.number;
        btn.onclick = function () {
          currentTable = t.number;
          // Update URL without reload
          var url = new URL(window.location);
          url.searchParams.set('table', t.number);
          history.replaceState(null, '', url);
          showMenuScreen();
        };
        container.appendChild(btn);
      });
      
      // Add Parcel Button
      var parcelContainer = document.createElement('div');
      parcelContainer.style.marginTop = 'var(--space-lg)';
      var parcelBtn = document.createElement('button');
      parcelBtn.className = 'btn btn-outline btn-lg';
      parcelBtn.innerHTML = '🛍️ Order Parcel / Takeaway';
      parcelBtn.onclick = function() {
        currentTable = 'Parcel';
        var url = new URL(window.location);
        url.searchParams.set('mode', 'parcel');
        history.replaceState(null, '', url);
        showMenuScreen();
      };
      parcelContainer.appendChild(parcelBtn);
      container.parentNode.appendChild(parcelContainer);
    }

    function showMenuScreen() {
      document.getElementById('table-select-screen').classList.add('hidden');
      document.getElementById('menu-screen').classList.remove('hidden');
      var displayStr = currentTable === 'Parcel' ? '🛍️ Parcel Order' : 'Table ' + currentTable;
      document.getElementById('table-display').textContent = displayStr;
      renderCategoryPills();
      renderMenu();
    }

    /* ── Category Pills ─────────────────────── */
    function renderCategoryPills() {
      var container = document.getElementById('category-pills');
      var cats = ['All'].concat(SaiSagar.categories);
      container.innerHTML = '';

      cats.forEach(function (cat) {
        var pill = document.createElement('button');
        pill.className = 'category-pill' + (cat === activeCategory ? ' active' : '');
        var sticker = cat === 'All' ? 'biryani.jpg' : (SaiSagar.categoryStickers[cat] || 'biryani.jpg');
        pill.innerHTML = '<img src="../assets/food/' + sticker + '" class="pill-sticker"> ' + cat;
        pill.onclick = function () {
          activeCategory = cat;
          renderCategoryPills();
          renderMenu();
          // Scroll to category
          if (cat !== 'All') {
            var section = document.getElementById('cat-' + cat.replace(/\s+/g, '-'));
            if (section) section.scrollIntoView({ behavior: 'smooth', block: 'start' });
          }
        };
        container.appendChild(pill);
      });
    }

    /* ── Menu Rendering ─────────────────────── */
    function renderMenu() {
      var container = document.getElementById('menu-container');
      var menu = SaiSagar.Store.MenuStore.getAvailable();

      // Filter by category
      if (activeCategory !== 'All') {
        menu = menu.filter(function (item) { return item.category === activeCategory; });
      }

      // Filter by search
      if (searchQuery) {
        menu = menu.filter(function (item) {
          return item.name.toLowerCase().indexOf(searchQuery) !== -1 ||
            item.description.toLowerCase().indexOf(searchQuery) !== -1 ||
            item.category.toLowerCase().indexOf(searchQuery) !== -1;
        });
      }

      // Group by category
      var grouped = {};
      menu.forEach(function (item) {
        if (!grouped[item.category]) grouped[item.category] = [];
        grouped[item.category].push(item);
      });

      if (Object.keys(grouped).length === 0) {
        container.innerHTML = '<div class="empty-state"><div class="empty-icon"><i data-lucide="search"></i></div><div class="empty-title">No items found</div><div class="empty-text">Try a different search or category</div></div>';
        return;
      }

      var html = '';
      var catOrder = SaiSagar.categories;
      catOrder.forEach(function (cat) {
        if (!grouped[cat]) return;
        var items = grouped[cat];
        var sticker = SaiSagar.categoryStickers[cat] || 'meal.png';
        html += '<div class="category-section" id="cat-' + cat.replace(/\s+/g, '-') + '">';
        html += '<h3 class="category-title"><img src="../assets/food/' + sticker + '" class="cat-title-sticker"> ' + cat +
          ' <span class="category-count">(' + items.length + ')</span></h3>';
        html += '<div class="menu-grid stagger">';

        items.forEach(function (item, index) {
          var cartItem = getCartItem(item.id);
          var qty = cartItem ? cartItem.quantity : 0;
          html += renderMenuItem(item, qty, index);
        });

        html += '</div></div>';
      });

      container.innerHTML = html;
    }

    function renderMenuItem(item, qty, index) {
      var badges = '<span class="badge badge-veg" style="font-size:9px;padding:2px 6px;">● VEG</span>';
      if (item.isJainAvailable) badges += ' <span class="badge badge-jain" style="font-size:9px;padding:2px 6px;">JAIN</span>';

      var actionBtn = '';
      if (qty > 0) {
        actionBtn = '<div class="qty-stepper">' +
          '<button onclick="updateQty(\'' + item.id + '\',-1)">−</button>' +
          '<span class="qty-value">' + qty + '</span>' +
          '<button onclick="updateQty(\'' + item.id + '\',1)">+</button>' +
          '</div>';
      } else {
        actionBtn = '<button class="add-btn" onclick="addToCart(\'' + item.id + '\')">ADD +</button>';
      }

      var delay = (index || 0) * 0.05;
      var imageSrc = '';
      if (item.emoji && (item.emoji.startsWith('data:image/') || item.emoji.startsWith('http'))) {
        imageSrc = item.emoji;
      } else {
        var sticker = SaiSagar.categoryStickers[item.category] || 'meal.png';
        imageSrc = '../assets/food/' + sticker;
      }
      return '<div class="menu-card animate-fade-in" style="animation-delay: ' + delay + 's">' +
        '<div class="item-sticker"><img src="' + imageSrc + '"></div>' +
        '<div class="item-details">' +
          '<div class="item-name">' + SaiSagar.Utils.escapeHtml(item.name) + '</div>' +
          '<div class="item-desc">' + SaiSagar.Utils.escapeHtml(item.description) + '</div>' +
          '<div class="item-badges">' + badges + '</div>' +
          '<div class="item-bottom">' +
            '<span class="item-price">' + SaiSagar.Utils.formatCurrencyShort(item.price) + '</span>' +
            actionBtn +
          '</div>' +
        '</div>' +
      '</div>';
    }

    /* ── Cart Logic ─────────────────────────── */
    function getCartItem(itemId) {
      return cart.find(function (c) { return c.id === itemId; });
    }

    function addToCart(itemId) {
      var menuItem = SaiSagar.Store.MenuStore.getById(itemId);
      if (!menuItem) return;

      var existing = getCartItem(itemId);
      if (existing) {
        existing.quantity++;
      } else {
        cart.push({
          id: menuItem.id,
          name: menuItem.name,
          price: menuItem.price,
          quantity: 1,
          emoji: menuItem.emoji || 'utensils',
          specialInstructions: ''
        });
      }

      updateCartUI();
      renderMenu();
      SaiSagar.Utils.showToast(menuItem.name + ' added to cart', 'success', 1500);
      triggerCartPulse();
    }

    function updateQty(itemId, delta) {
      var item = getCartItem(itemId);
      if (!item) return;

      item.quantity += delta;
      if (item.quantity <= 0) {
        cart.splice(cart.indexOf(item), 1);
      }
      
      updateCartUI();
      renderMenu();
      if (delta > 0) triggerCartPulse();
    }
    
    function triggerCartPulse() {
      var btn = document.getElementById('view-cart-btn');
      if (btn) {
        btn.classList.remove('cart-pulse');
        void btn.offsetWidth; // trigger reflow
        btn.classList.add('cart-pulse');
      }
    }

    function removeFromCart(itemId) {
      cart = cart.filter(function (c) { return c.id !== itemId; });
      updateCartUI();
      renderMenu();
      renderCartSheet();
    }

    function updateCartUI() {
      var totalItems = cart.reduce(function (s, c) { return s + c.quantity; }, 0);
      var totalPrice = cart.reduce(function (s, c) { return s + c.price * c.quantity; }, 0);

      document.getElementById('cart-count').textContent = totalItems + ' item' + (totalItems !== 1 ? 's' : '');
      document.getElementById('cart-total').textContent = SaiSagar.Utils.formatCurrencyShort(totalPrice);

      var cartBar = document.getElementById('cart-bar');
      if (totalItems > 0) {
        cartBar.classList.add('visible');
      } else {
        cartBar.classList.remove('visible');
      }
    }

    /* ── Cart Sheet ─────────────────────────── */
    function openCart() {
      renderCartSheet();
      document.getElementById('cart-overlay').classList.add('active');
      document.getElementById('cart-sheet').classList.add('active');
    }

    function closeCart() {
      document.getElementById('cart-overlay').classList.remove('active');
      document.getElementById('cart-sheet').classList.remove('active');
    }

    function renderCartSheet() {
      var container = document.getElementById('cart-items');
      if (cart.length === 0) {
        container.innerHTML = '<div class="empty-state" style="padding: var(--space-xl) 0;"><div class="empty-icon"><i data-lucide="shopping-cart"></i></div><div class="empty-title">Cart is empty</div></div>';
        document.getElementById('cart-totals').innerHTML = '';
        document.getElementById('place-order-btn').disabled = true;
        return;
      }

      var html = '';
      cart.forEach(function (item) {
        var menuItem = SaiSagar.Store.MenuStore.getById(item.id);
        var imageSrc = '';
        if (menuItem && menuItem.emoji && (menuItem.emoji.startsWith('data:image/') || menuItem.emoji.startsWith('http'))) {
          imageSrc = menuItem.emoji;
        } else {
          var catPhoto = menuItem ? (SaiSagar.categoryStickers[menuItem.category] || 'biryani.jpg') : 'biryani.jpg';
          imageSrc = '../assets/food/' + catPhoto;
        }
        html += '<div class="cart-item">' +
          '<img src="' + imageSrc + '" style="width:40px;height:40px;border-radius:8px;object-fit:cover;flex-shrink:0">' +
          '<div class="ci-details">' +
            '<div class="ci-name">' + SaiSagar.Utils.escapeHtml(item.name) + '</div>' +
            '<div class="ci-price">' + SaiSagar.Utils.formatCurrencyShort(item.price) + ' each</div>' +
          '</div>' +
          '<div class="qty-stepper">' +
            '<button onclick="updateQty(\'' + item.id + '\',-1);renderCartSheet()">−</button>' +
            '<span class="qty-value">' + item.quantity + '</span>' +
            '<button onclick="updateQty(\'' + item.id + '\',1);renderCartSheet()">+</button>' +
          '</div>' +
          '<span class="ci-total">' + SaiSagar.Utils.formatCurrencyShort(item.price * item.quantity) + '</span>' +
          '<button class="ci-remove" onclick="removeFromCart(\'' + item.id + '\')" title="Remove">✕</button>' +
        '</div>';
      });
      container.innerHTML = html;

      var total = cart.reduce(function (s, c) { return s + c.price * c.quantity; }, 0);
      var totalItems = cart.reduce(function (s, c) { return s + c.quantity; }, 0);
      document.getElementById('cart-totals').innerHTML =
        '<div class="total-row"><span>Items</span><span>' + totalItems + '</span></div>' +
        '<div class="total-row"><span>Subtotal</span><span>' + SaiSagar.Utils.formatCurrency(total) + '</span></div>' +
        '<div class="total-row" style="color:var(--text-muted);font-size:var(--text-xs)"><span>GST will be added at billing</span><span></span></div>' +
        '<div class="total-row grand"><span>Total</span><span>' + SaiSagar.Utils.formatCurrency(total) + '</span></div>';

      document.getElementById('place-order-btn').disabled = false;
    }

    /* ── Place Order ────────────────────────── */
    function placeOrder() {
      if (cart.length === 0) return;

      var specialInstr = document.getElementById('special-instructions').value.trim();

      // Add special instructions to the first item or create metadata
      var items = cart.map(function (c) {
        return {
          id: c.id,
          name: c.name,
          price: c.price,
          quantity: c.quantity,
          emoji: c.emoji,
          specialInstructions: specialInstr
        };
      });

      var order = SaiSagar.Store.OrderStore.create(currentTable, items);
      currentOrderId = order.id;

      // Close cart, show success
      closeCart();
      showOrderStatus(order);

      // Clear cart
      cart = [];
      updateCartUI();

      SaiSagar.Utils.playNotificationSound('order');
    }

    /* ── Order Status ───────────────────────── */
    function showOrderStatus(order) {
      document.getElementById('order-status-overlay').classList.add('active');
      document.getElementById('order-number-display').textContent = order.orderNumber;
      updateOrderTracking(order);
    }

    function updateOrderTracking(order) {
      var steps = [
        { key: 'new', icon: '<i data-lucide="edit"></i>', title: 'Order Placed', desc: 'Your order has been received' },
        { key: 'preparing', icon: '<i data-lucide="chef-hat"></i>', title: 'Preparing', desc: 'Chef is cooking your food' },
        { key: 'ready', icon: '<i data-lucide="check-circle"></i>', title: 'Ready', desc: 'Your food is ready!' },
        { key: 'served', icon: '<i data-lucide="utensils"></i>️', title: 'Served', desc: 'Enjoy your meal!' }
      ];

      var statusOrder = ['new', 'preparing', 'ready', 'served'];
      var currentIdx = statusOrder.indexOf(order.status);

      // Update icon and title based on current status
      var statusMessages = {
        'new': { icon: '<i data-lucide="hourglass"></i>', title: 'Order Received!', sub: 'Waiting for the kitchen to start' },
        'preparing': { icon: '<i data-lucide="chef-hat"></i>', title: 'Being Prepared!', sub: 'The chef is working on your order' },
        'ready': { icon: '<i data-lucide="bell-ring"></i>', title: 'Food is Ready!', sub: 'Your food will be served shortly' },
        'served': { icon: '🎉', title: 'Bon Appétit!', sub: 'Enjoy your delicious meal!' }
      };

      var msg = statusMessages[order.status] || statusMessages['new'];
      document.getElementById('order-status-icon').innerHTML = msg.icon;
      document.getElementById('order-status-title').textContent = msg.title;
      document.getElementById('order-status-sub').textContent = msg.sub;

      var html = '';
      steps.forEach(function (step, i) {
        var state = '';
        if (i < currentIdx) state = 'completed';
        else if (i === currentIdx) state = 'active';

        var time = '';
        if (order.statusHistory) {
          var histItem = order.statusHistory.find(function (h) { return h.status === step.key; });
          if (histItem) time = SaiSagar.Utils.formatTime(histItem.at);
        }

        html += '<div class="tracker-step ' + state + '">' +
          '<div class="tracker-dot">' + step.icon + '</div>' +
          '<div class="tracker-info">' +
            '<div class="tracker-title">' + step.title + '</div>' +
            '<div class="tracker-time">' + (time || '—') + '</div>' +
          '</div></div>';
      });

      document.getElementById('order-tracker').innerHTML = html;
    }

    function startNewOrder() {
      currentOrderId = null;
      document.getElementById('order-status-overlay').classList.remove('active');
      document.getElementById('special-instructions').value = '';
      renderMenu();
    }

    /* ── Periodic refresh for tracking ──────── */
    setInterval(function () {
      if (currentOrderId) {
        var order = SaiSagar.Store.OrderStore.getById(currentOrderId);
        if (order) updateOrderTracking(order);
      }
    }, 5000);
  </script>
  <script src="https://unpkg.com/lucide@latest"></script>
</body>
</html>
